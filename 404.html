<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nie znaleziono - Łukasz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Inter:wght@300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <meta name="theme-color" content="#1C1410">
</head>
<body>
  <div class="error-page">
    <div class="error-page__content">
      <p class="error-page__code">404</p>
      <h1 class="error-page__title">Tej ścieżki nie ma.</h1>
      <p class="error-page__text">Może wróć do początku - tam zawsze jest dobrze.</p>
      <a href="/" class="btn btn--primary">Wróć do domu</a>
    </div>
  </div>

  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: var(--space-md);
      background: linear-gradient(165deg, var(--ink) 0%, var(--forest) 100%);
    }
    .error-page__code {
      font-family: var(--font-heading);
      font-size: clamp(5rem, 15vw, 10rem);
      font-weight: 400;
      color: var(--gold);
      opacity: 0.2;
      line-height: 1;
    }
    .error-page__title {
      font-size: clamp(1.4rem, 4vw, 2rem);
      margin-bottom: var(--space-sm);
    }
    .error-page__text {
      font-style: italic;
      font-family: var(--font-heading);
      opacity: 0.7;
      margin-bottom: var(--space-md);
    }
  </style>
</body>
</html>
